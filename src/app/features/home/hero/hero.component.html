<section
  class="hero"
  id="hero"
  appSection="hero"
  appInspectTarget="app-hero"
  inspectMeta="standalone · OnPush · signals"
>
  <div class="hero__bg" aria-hidden="true"></div>

  <svg
    class="hero__panel"
    aria-hidden="true"
    viewBox="0 0 480 320"
    focusable="false"
  >
    <rect class="hero__panel-frame" x="0.5" y="0.5" width="479" height="319" rx="14" />
    <line class="hero__panel-rule" x1="0" y1="44" x2="480" y2="44" />
    <circle class="hero__panel-dot" cx="20" cy="22" r="4.5" />
    <circle class="hero__panel-dot" cx="38" cy="22" r="4.5" />
    <circle class="hero__panel-dot" cx="56" cy="22" r="4.5" />
    <text class="hero__panel-file" x="240" y="28" text-anchor="middle">~/paul.alias</text>

    <g class="hero__panel-code">
      <text x="22" y="86">
        <tspan class="hero__panel-kw">const</tspan>
        <tspan> stack = </tspan>
        <tspan class="hero__panel-fn">signal</tspan>
        <tspan>(&#123;</tspan>
      </text>
      <text x="44" y="116">
        <tspan class="hero__panel-key">front</tspan>
        <tspan>:  </tspan>
        <tspan class="hero__panel-str">'Angular 17'</tspan>
        <tspan>,</tspan>
      </text>
      <text x="44" y="144">
        <tspan class="hero__panel-key">lang</tspan>
        <tspan>:   </tspan>
        <tspan class="hero__panel-str">'TypeScript'</tspan>
        <tspan>,</tspan>
      </text>
      <text x="44" y="172">
        <tspan class="hero__panel-key">rx</tspan>
        <tspan>:     </tspan>
        <tspan class="hero__panel-str">'RxJS'</tspan>
        <tspan>,</tspan>
      </text>
      <text x="44" y="200">
        <tspan class="hero__panel-key">back</tspan>
        <tspan>:   </tspan>
        <tspan class="hero__panel-str">'Node &middot; Mongo'</tspan>
        <tspan>,</tspan>
      </text>
      <text x="44" y="228">
        <tspan class="hero__panel-key">tools</tspan>
        <tspan>:  </tspan>
        <tspan class="hero__panel-str">'Git &middot; Figma &middot; AI'</tspan>
      </text>
      <text x="22" y="258">&#125;);</text>
      <text x="22" y="290" class="hero__panel-comment">
        <tspan>// 5.6y &middot; live</tspan>
        <tspan class="hero__panel-cursor">_</tspan>
      </text>
    </g>
  </svg>

  <div class="hero__inner">
    <p class="hero__eyebrow">{{ profile.location }} &middot; IST (UTC+5:30)</p>

    <h1 class="hero__name">
      Paul<br />
      <span class="hero__name-accent">Alias</span>
    </h1>

    <p class="hero__role">{{ profile.role }} &middot; {{ profile.company }}</p>

    <p class="hero__value">{{ profile.valueProposition }}</p>

    <p class="hero__signal" role="status" aria-label="Years of experience, counting live">
      <span class="hero__signal-code">experience = signal(</span><span class="hero__signal-value">{{ years() | number: '1.1-1' }}</span><span class="hero__signal-code">)</span>
      <span class="hero__signal-note">years &mdash; live, like everything on this page</span>
    </p>

    <div class="hero__actions">
      <a routerLink="/" fragment="projects" class="btn btn--primary">View projects</a>
      <a
        [href]="profile.resumeUrl"
        class="btn btn--ghost"
        download
        (click)="trackResumeDownload()"
        >Download resume</a
      >
    </div>
  </div>

  <p class="hero__scroll-hint" aria-hidden="true">scroll</p>
</section>
