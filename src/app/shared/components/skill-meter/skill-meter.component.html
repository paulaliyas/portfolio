<div class="meter">
  <div class="meter__head">
    <span class="meter__label">{{ label }}</span>
    <span class="meter__value">{{ level }}</span>
  </div>
  <div
    class="meter__track"
    role="meter"
    [attr.aria-valuenow]="level"
    aria-valuemin="0"
    aria-valuemax="100"
    [attr.aria-label]="label + ' proficiency'"
  >
    <div class="meter__fill" [style.--level]="level + '%'"></div>
  </div>
</div>
