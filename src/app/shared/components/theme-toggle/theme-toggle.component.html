<button
  type="button"
  class="toggle"
  (click)="theme.toggle()"
  [class.toggle--light]="theme.theme() === 'light'"
  [attr.aria-label]="theme.theme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
>
  <svg class="toggle__icon toggle__icon--sun" viewBox="0 0 24 24" aria-hidden="true">
    <circle cx="12" cy="12" r="4.4" fill="currentColor" />
    <g stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <line x1="12" y1="2.5" x2="12" y2="5" />
      <line x1="12" y1="19" x2="12" y2="21.5" />
      <line x1="2.5" y1="12" x2="5" y2="12" />
      <line x1="19" y1="12" x2="21.5" y2="12" />
      <line x1="5.2" y1="5.2" x2="7" y2="7" />
      <line x1="17" y1="17" x2="18.8" y2="18.8" />
      <line x1="5.2" y1="18.8" x2="7" y2="17" />
      <line x1="17" y1="7" x2="18.8" y2="5.2" />
    </g>
  </svg>
  <svg class="toggle__icon toggle__icon--moon" viewBox="0 0 24 24" aria-hidden="true">
    <path
      d="M20 14.5A8.5 8.5 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5Z"
      fill="currentColor"
    />
  </svg>
</button>
